<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagrama EDT - Sistema de Gestión para Trillion Networks Security</title>
  <style>
    :root {
      --bg: #eef3f9;
      --ink: #111827;
      --muted: #475569;
      --line: #202020;
      --paper: #ffffff;
      --blue: #1e3a8a;
      --blue2: #2563eb;
      --teal: #0f766e;
      --green: #15803d;
      --amber: #d97706;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.16);
      --module-width: 390px;
      --gap: 44px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 24px 24px, rgba(30, 58, 138, 0.08) 2px, transparent 2px),
        linear-gradient(135deg, #dbeafe, #f8fafc 48%, #ccfbf1);
      background-size: 34px 34px, 100% 100%;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      background: linear-gradient(135deg, var(--blue), var(--teal));
      color: #fff;
      padding: 16px 22px;
      box-shadow: var(--shadow);
      z-index: 10;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .title h1 {
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .title p {
      font-size: 14px;
      opacity: 0.94;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 300px;
    }

    button {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.15);
      color: white;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255,255,255,0.26);
    }

    .workspace {
      position: relative;
      overflow: hidden;
    }

    .viewport {
      height: 100%;
      overflow: auto;
      padding: 34px;
      cursor: grab;
    }

    .viewport:active {
      cursor: grabbing;
    }

    .diagram {
      width: max-content;
      min-width: 6480px;
      padding: 10px 20px 90px;
      transform-origin: top left;
      transition: transform 0.15s ease;
    }

    .root-row {
      display: flex;
      justify-content: center;
      padding-bottom: 48px;
      position: relative;
    }

    .root-node {
      background: linear-gradient(135deg, var(--blue), #0f172a);
      color: white;
      border: 4px solid #bfdbfe;
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px 28px;
      width: 680px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .root-node h2 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .root-node p {
      font-size: 14px;
      opacity: 0.94;
    }

    .root-row::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 3px;
      height: 48px;
      background: var(--line);
      transform: translateX(-50%);
    }

    .modules-row {
      display: grid;
      grid-template-columns: repeat(14, var(--module-width));
      gap: var(--gap);
      align-items: start;
      position: relative;
      padding-top: 48px;
    }

    .modules-row::before {
      content: "";
      position: absolute;
      top: 0;
      left: calc(var(--module-width) / 2);
      right: calc(var(--module-width) / 2);
      height: 3px;
      background: var(--line);
    }

    .module-tree {
      position: relative;
      min-height: 500px;
    }

    .module-tree::before {
      content: "";
      position: absolute;
      top: -48px;
      left: 50%;
      width: 3px;
      height: 48px;
      background: var(--line);
      transform: translateX(-50%);
    }

    .tree,
    .tree ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .tree {
      font-family: "Consolas", "Segoe UI", monospace;
      font-size: 12px;
      line-height: 1.25;
    }

    .tree ul {
      margin-left: 28px;
      padding-left: 20px;
      position: relative;
    }

    .tree ul::before {
      content: "";
      position: absolute;
      top: -7px;
      bottom: 16px;
      left: 0;
      border-left: 2px solid var(--line);
    }

    .tree li {
      position: relative;
      margin: 10px 0;
      padding-left: 18px;
    }

    .tree li::before {
      content: "";
      position: absolute;
      top: 15px;
      left: -20px;
      width: 38px;
      border-top: 2px solid var(--line);
    }

    .tree > li {
      padding-left: 0;
      margin: 0;
    }

    .tree > li::before {
      display: none;
    }

    .node {
      display: inline-block;
      background: rgba(255,255,255,0.96);
      border: 2px solid #1f2937;
      color: #111827;
      border-radius: 2px;
      padding: 8px 10px;
      min-width: 150px;
      max-width: 330px;
      box-shadow: 0 4px 10px rgba(15,23,42,0.10);
      white-space: normal;
    }

    .node.module {
      background: #ead7c0;
      border-color: #a07855;
      color: #3b2412;
      font-weight: 900;
      min-width: 255px;
      text-align: center;
    }

    .node.package {
      background: #d1fae5;
      border-color: #059669;
      color: #064e3b;
      font-weight: 800;
    }

    .node.task {
      background: #e0f2fe;
      border-color: #0284c7;
      color: #0c4a6e;
      font-weight: 700;
    }

    .module-tree.highlight .node.module {
      background: #ead7c0;
      border-color: #a07855;
      color: #3b2412;
    }

    .module-tree.highlight .node.package {
      background: #d1fae5;
      border-color: #059669;
      color: #064e3b;
    }

    .zoom-label {
      position: fixed;
      left: 22px;
      bottom: 22px;
      z-index: 20;
      background: rgba(15, 23, 42, 0.88);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .note {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: min(460px, calc(100vw - 44px));
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-left: 8px solid var(--amber);
      border-radius: 18px;
      padding: 14px 16px;
      color: #78350f;
      box-shadow: var(--shadow);
      font-size: 13px;
      z-index: 20;
    }

    .note strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    @media print {
      body {
        overflow: visible;
        background: white;
      }

      .app {
        display: block;
        height: auto;
      }

      .topbar {
        box-shadow: none;
      }

      .actions,
      .zoom-label,
      .note {
        display: none;
      }

      .workspace,
      .viewport {
        overflow: visible;
        height: auto;
        padding: 0;
      }

      .diagram {
        transform: scale(0.25) !important;
        transform-origin: top left;
      }

      .node {
        box-shadow: none;
      }
    }
  </style>
</head>

  <div class="app">
    <header class="topbar">

        <div class="title">
          <h1>Diagrama EDT</h1>
          <p>Sistema de Gestión para Trillion Networks Security</p>
        </div>
        <div class="actions">

          <section class="modules-row" id="modulesRow"></section>
        </section>
      </div>

      <div class="zoom-label" id="zoomLabel">Zoom: 100%</div>

    </main>
  </div>

    const modulesRow = document.getElementById("modulesRow");

    function node(label, cls) {
      return `<span class="node ${cls}">${label}</span>`;
    }

    function renderModule(module) {
      const packages = module.packages.map(pkg => {
        const tasks = pkg[2].map(task => `
          <li>${node(`${task[0]} ${task[1]}`, "task")}</li>
        `).join("");

        return `
          <li>
            ${node(`${pkg[0]} ${pkg[1]}`, "package")}
            <ul>${tasks}</ul>
          </li>
        `;
      }).join("");

      return `
        <article class="module-tree ${module.highlight ? "highlight" : ""}">
          <ul class="tree">
            <li>
              ${node(`${module.num} ${module.title}`, "module")}
              <ul>${packages}</ul>
            </li>
          </ul>
        </article>
      `;
    }

    modulesRow.innerHTML = EDT.map(renderModule).join("");

    const diagram = document.getElementById("diagram");
    const viewport = document.getElementById("viewport");
    const zoomLabel = document.getElementById("zoomLabel");

    let scale = 1;

    function applyZoom() {
      diagram.style.transform = `scale(${scale})`;
      zoomLabel.textContent = `Zoom: ${Math.round(scale * 100)}%`;
    }

    function zoomIn() {
      scale = Math.min(1.8, scale + 0.1);
      applyZoom();
    }

    function zoomOut() {
      scale = Math.max(0.20, scale - 0.1);
      applyZoom();
    }

    function resetZoom() {
      scale = 1;
      applyZoom();
      viewport.scrollTo({ left: 0, top: 0, behavior: "smooth" });
    }

    function fitScreen() {
      const availableWidth = viewport.clientWidth - 64;
      const diagramWidth = 6480;
      scale = Math.max(0.20, Math.min(1, availableWidth / diagramWidth));
      applyZoom();
      viewport.scrollTo({ left: 0, top: 0, behavior: "smooth" });
    }

    window.addEventListener("load", fitScreen);

    let isDown = false;
    let startX;
    let startY;
    let scrollLeft;
    let scrollTop;

    viewport.addEventListener("mousedown", (e) => {
      isDown = true;
      startX = e.pageX - viewport.offsetLeft;
      startY = e.pageY - viewport.offsetTop;
      scrollLeft = viewport.scrollLeft;
      scrollTop = viewport.scrollTop;
    });

    viewport.addEventListener("mouseleave", () => isDown = false);
    viewport.addEventListener("mouseup", () => isDown = false);

    viewport.addEventListener("mousemove", (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - viewport.offsetLeft;
      const y = e.pageY - viewport.offsetTop;
      viewport.scrollLeft = scrollLeft - (x - startX) * 1.2;
      viewport.scrollTop = scrollTop - (y - startY) * 1.2;
    });

    viewport.addEventListener("wheel", (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        if (e.deltaY < 0) zoomIn();
        else zoomOut();
      }
    }, { passive: false });
  </script>
